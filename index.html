<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 성지순례</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-box { width: 280px; text-align: center; font-family: 'Malgun Gothic', sans-serif; }
        .my-photo { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        
        /* 영상 박스: 깃허브 보안을 뚫기 위한 표준 16:9 설정 */
        .video-container { 
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0; 
            border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .map-btn { 
            display: block; background: #4285F4; color: white; padding: 12px; 
            border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 시작 (우메다 관람차 위치)
        var map = L.map('map').setView([34.7042, 135.5006], 15);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}').addTo(map);

        // 2. 팝업 내용 (사진 + 영상)
        var content = `
            <div class="popup-box">
                <h3 style="margin-bottom:10px;">우메다 헵파이브 관람차</h3>
                
                <img src="https://i.ifh.cc/KMBGJO.jpg" class="my-photo">
                
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/V6_Vp9vC0Xg?start=215&rel=0&enablejsapi=1" 
                        title="TREASURE Video"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
                
                <p style="font-size:13px; color:#666; margin-bottom:12px;">트레저 멤버들이 다녀간 빨간 관람차 🎡</p>
                <a href="https://www.google.com/maps?q=34.7042,135.5006" target="_blank" class="map-btn">구글맵에서 보기</a>
            </div>
        `;

        // 3. 마커 찍기
        L.marker([34.7042, 135.5006]).addTo(map).bindPopup(content).openPopup();
    </script>
</body>
</html>
