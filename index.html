<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 10px; }
        .popup-container { width: 220px; font-family: 'Malgun Gothic', sans-serif; }
        .popup-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .popup-desc { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.4; }
        .thumb-img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; cursor: pointer; margin-bottom: 8px; border: 1px solid #ddd; }
        .map-btn { 
            display: block; background: #4285F4; color: white; text-align: center; 
            padding: 8px; margin-top: 10px; border-radius: 5px; text-decoration: none; font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([34.667, 135.501], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 사진은 멤버들이 해당 장소에 있는 영상의 장면을 활용하도록 설정
        var locations = [
            {
                name: "신세카이 & 츠텐카쿠",
                coords: [34.6525, 135.5063],
                desc: "멤버들이 화려한 간판 아래서 쿠시카츠 먹방을 찍었던 오사카 성지!",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Shinsekai+Osaka&hl=ko",
                videoUrl: "https://www.youtube.com/watch?v=V6_Vp9vC0Xg&t=54s",
                img: "https://img.youtube.com/vi/V6_Vp9vC0Xg/hqdefault.jpg" // 신세카이 등장 장면
            },
            {
                name: "아베노 하루카스 300",
                coords: [34.6458, 135.5139],
                desc: "멤버들이 가장 높은 곳에서 오사카 야경을 보며 감탄했던 전망대야.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Abeno+Harukas+300&hl=ko",
                videoUrl: "https://www.youtube.com/watch?v=V6_Vp9vC0Xg&t=373s",
                img: "https://img.youtube.com/vi/V6_Vp9vC0Xg/mqdefault.jpg" // 하루카스 등장 장면
            },
            {
                name: "나카노시마 공원",
                coords: [34.6923, 135.5065],
                desc: "장미 정원을 배경으로 멤버들이 여유롭게 산책하며 힐링했던 공원!",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Nakanoshima+Park+Osaka&hl=ko",
                videoUrl: "https://www.youtube.com/watch?v=VtjMPZgy4yU&t=73s",
                img: "https://img.youtube.com/vi/VtjMPZgy4yU/hqdefault.jpg" // 나카노시마 등장 장면
            },
            {
                name: "카라카라테이 (야키니쿠)",
                coords: [34.6667, 135.5003],
                desc: "멤버들이 '진짜 맛있다'를 연발하며 우설을 구워 먹던 노포 야키니쿠 맛집.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Karakaratei+Osaka&hl=ko",
                videoUrl: "https://www.youtube.com/watch?v=VtjMPZgy4yU&t=305s",
                img: "https://img.youtube.com/vi/VtjMPZgy4yU/mqdefault.jpg" // 카라카라테이 등장 장면
            }
        ];

        locations.forEach(function(loc) {
            var popupContent = `
                <div class="popup-container">
                    <div class="popup-title">${loc.name}</div>
                    <div class="popup-desc">${loc.desc}</div>
                    <a href="${loc.videoUrl}" target="_blank">
                        <img src="${loc.img}" class="thumb-img" title="클릭하면 영상의 해당 장면으로 이동합니다">
                    </a>
                    <a href="${loc.googleMap}" target="_blank" class="map-btn">구글 지도로 상세보기 (한국어)</a>
                </div>
            `;
            L.marker(loc.coords).addTo(map).bindPopup(popupContent);
        });
    </script>
</body>
</html>
