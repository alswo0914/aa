<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-box { width: 280px; text-align: center; font-family: 'Malgun Gothic', sans-serif; }
        .thumb-img { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; display: block; }
        
        .video-container { 
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0; 
            border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* 버튼 스타일: 텍스트는 '상세정보' */
        .map-btn { 
            display: block; background: #4285F4; color: white; padding: 10px; 
            border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px;
        }
        .leaflet-popup-content { width: 300px !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([34.67, 135.50], 13);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}').addTo(map);

        var locations = [
            {
                name: "우메다 헵파이브 관람차",
                lat: 34.7038, lng: 135.4999,
                img: "https://i.ifh.cc/KMBGJO.jpg",
                ytId: "sGNVI6fFS68",
                start: 707,
                desc: "빨간 관람차 성지 🎡",
                link: "https://www.google.com/maps/search/?api=1&query=HEP+FIVE+Ferris+Wheel&query_place_id=ChIJAQDAo5PmAGARcMqvnh2Reqs"
            },
            {
                name: "본가 오타코 도톤보리 본점",
                lat: 34.6686, lng: 135.5032,
                img: "https://i.ifh.cc/K9Q3GL.jpg",
                ytId: "sGNVI6fFS68",
                start: 898,
                desc: "큼직한 문어가 들어간 타코야키 맛집 🐙",
                link: "https://www.google.com/maps/search/?api=1&query=Honke+Otako+Dotonbori&query_place_id=ChIJU3WQMmXnAGARss7JPdOEprc"
            },
            {
                name: "스미비야키 호르몬 카라카라테이",
                lat: 34.6665, lng: 135.4993,
                img: "https://i.ifh.cc/ktaqSZ.jpg", 
                ytId: "VtjMPZgy4yU",
                start: 300,
                desc: "진짜 야키니쿠 성지! 입에서 살살 녹는 고기 🥩",
                link: "https://www.google.com/maps/search/?api=1&query=Karakaratei+Namba&query_place_id=ChIJ584H3xLnAGAR2rPLDWYJ9ss"
            },
            {
                name: "쿠시카츠 다루마 츠텐카쿠점",
                lat: 34.6527, lng: 135.5064,
                img: "https://i.ifh.cc/Bmab3m.jpg",
                ytId: "sGNVI6fFS68",
                start: 54,
                desc: "멤버들이 맛있게 먹은 쿠시카츠 맛집! 🍢",
                link: "https://www.google.com/maps/search/?api=1&query=Kushikatsu+Daruma+Tsutenkaku&query_place_id=ChIJn2cI11_nAGARsJ-CGwAz7P0"
            },
            {
                name: "쓰텐카쿠 전망대",
                lat: 34.6525, lng: 135.5063,
                img: "https://i.ifh.cc/DcHlcn.jpg", 
                ytId: "sGNVI6fFS68",
                start: 54,
                desc: "오사카의 랜드마크 전망대 🗼",
                link: "https://www.google.com/maps/search/?api=1&query=Tsutenkaku&query_place_id=ChIJ_0Lgd2DnAGARV0X03lbPy-U"
            },
            {
                name: "나카노시마 공원",
                lat: 34.6924, lng: 135.5073,
                img: "https://i.ifh.cc/NQlfry.jpg",
                ytId: "VtjMPZgy4yU",
                start: 70,
                desc: "장미 정원 산책 코스 🌹",
                link: "https://www.google.com/maps/search/?api=1&query=Nakanoshima+Park&query_place_id=ChIJPXiMg97mAGARsiccqVj_Os8"
            },
            {
                name: "도톤보리 글리코상",
                lat: 34.6689, lng: 135.5010,
                img: "https://i.ifh.cc/4gOAz3.jpg", 
                ytId: "sGNVI6fFS68", 
                start: 898,
                desc: "오사카 인증샷 필수 성지! 📸",
                link: "https://www.google.com/maps/search/?api=1&query=Glico+Sign&query_place_id=ChIJ6XHOkxTnAGARvyn92D4gWVs"
            }
        ];

        locations.forEach(function(loc) {
            var content = `
                <div class="popup-box">
                    <h3 style="margin:5px 0; color:#00ADEF;">${loc.name}</h3>
                    <img src="${loc.img}" class="thumb-img" alt="인증샷">
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${loc.ytId}?start=${loc.start}" allowfullscreen></iframe>
                    </div>
                    <p style="font-size:12px; color:#666; margin-bottom:10px;">${loc.desc}</p>
                    <a href="${loc.link}" target="_blank" class="map-btn">상세정보</a>
                </div>
            `;
            L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(content);
        });
    </script>
</body>
</html>
