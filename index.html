<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 성지순례</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-box { width: 260px; text-align: center; font-family: sans-serif; }
        /* 사진 스타일 */
        .my-photo { width: 100%; border-radius: 8px; margin-bottom: 8px; }
        /* 영상 박스 - 가장 표준적인 설정 */
        .video-wrapper { 
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0; 
            border-radius: 8px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([34.7042, 135.5006], 15);
        
        // 구글 지도 레이어 (가장 안 깨짐)
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}').addTo(map);

        var content = `
            <div class="popup-box">
                <h3 style="margin:5px 0;">우메다 헵파이브</h3>
                <img src="https://i.ifh.cc/KMBGJO.jpg" class="my-photo">
                
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/V6_Vp9vC0Xg?start=215" allowfullscreen></iframe>
                </div>
                <p style="font-size:12px; color:#666; margin-top:8px;">트레저 성지순례 인증!</p>
            </div>
        `;

        L.marker([34.7042, 135.5006]).addTo(map).bindPopup(content).openPopup();
    </script>
</body>
</html>
