<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-container { width: 280px; font-family: sans-serif; text-align: center; }
        .popup-title { font-size: 17px; font-weight: bold; margin-bottom: 10px; }
        .thumb-img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        
        /* 가장 단순하고 확실한 영상 박스 */
        .video-box { 
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0; 
            border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px;
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .map-btn { 
            display: block; background: #4285F4; color: white; padding: 10px; 
            border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([34.7042, 135.5006], 14);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}').addTo(map);

        var content = `
            <div class="popup-container">
                <div class="popup-title">우메다 헵파이브 관람차</div>
                
                <img src="https://i.ifh.cc/KMBGJO.jpg" class="thumb-img">
                
                <div class="video-box">
                    <iframe src="https://www.youtube.com/embed/V6_Vp9vC0Xg?start=215" allowfullscreen></iframe>
                </div>
                
                <p style="font-size:12px; color:#666;">멤버들이 방문한 오사카 성지!</p>
                <a href="https://www.google.com/maps/search/?api=1&query=HEP+FIVE+Ferris+Wheel&hl=ko" target="_blank" class="map-btn">구글맵에서 위치 보기</a>
            </div>
        `;

        L.marker([34.7042, 135.5006]).addTo(map).bindPopup(content);
    </script>
</body>
</html>
