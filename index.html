<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        .popup-container { width: 220px; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        .popup-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .popup-desc { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.4; }
        .map-btn { 
            display: block; background: #4285F4; color: white; text-align: center; 
            padding: 8px; margin-top: 10px; border-radius: 5px; text-decoration: none; font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([34.667, 135.501], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 구글 공식 검색 인터페이스(Search)를 이용해 한국어 결과를 강제함
        var locations = [
            {
                name: "신세카이 & 츠텐카쿠",
                coords: [34.6525, 135.5063],
                desc: "오사카의 정취를 느낄 수 있는 화려한 상점가와 전망대. 멤버들이 쿠시카츠를 즐겼던 곳이야.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=신세카이+츠텐카쿠&hl=ko",
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=54"
            },
            {
                name: "아베노 하루카스 300",
                coords: [34.6458, 135.5139],
                desc: "일본에서 가장 높은 빌딩 중 하나로, 오사카 전경을 한눈에 담을 수 있는 전망대야.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=아베노+하루카스+300&hl=ko",
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=373"
            },
            {
                name: "나카노시마 공원",
                coords: [34.6923, 135.5065],
                desc: "강 사이에 위치한 도심 속 힐링 공간. 멤버들이 산책하며 여유를 즐겼던 장미 정원이 유명해.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=나카노시마+공원&hl=ko",
                yt: "https://www.youtube.com/embed/VtjMPZgy4yU?start=73"
            },
            {
                name: "카라카라테이 (야키니쿠)",
                coords: [34.6667, 135.5003],
                desc: "우설과 호르몬 구이가 일품인 현지인 맛집. 멤버들이 감탄하며 폭풍 흡입했던 노포야.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=카라카라테이+오사카&hl=ko",
                yt: "https://www.youtube.com/embed/VtjMPZgy4yU?start=305"
            }
        ];

        locations.forEach(function(loc) {
            var popupContent = `
                <div class="popup-container">
                    <div class="popup-title">${loc.name}</div>
                    <div class="popup-desc">${loc.desc}</div>
                    <iframe width="100%" height="120" src="${loc.yt}" frameborder="0" style="border-radius:5px;" allowfullscreen></iframe>
                    <a href="${loc.googleMap}" target="_blank" class="map-btn">구글 지도로 상세보기</a>
                </div>
            `;
            L.marker(loc.coords).addTo(map).bindPopup(popupContent);
        });
    </script>
</body>
</html>
