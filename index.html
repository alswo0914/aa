<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-container { width: 280px; font-family: 'Malgun Gothic', sans-serif; padding: 5px; }
        .popup-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #333; text-align: center; }
        /* 사진 스타일 */
        .thumb-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; display: block; border: 1px solid #ddd; }
        /* 영상 스타일 */
        .video-container { 
            position: relative; width: 100%; padding-bottom: 56.25%; 
            height: 0; border-radius: 8px; overflow: hidden; margin-bottom: 10px; border: 1px solid #ddd;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .popup-desc { font-size: 13px; color: #555; margin-bottom: 12px; line-height: 1.5; }
        .map-btn { 
            display: block; background: #4285F4; color: white; text-align: center; 
            padding: 12px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 배경 지도 한국어 설정 (구글 레이어)
        var map = L.map('map').setView([34.7042, 135.5006], 13);
        L.tileLayer('https://mt0.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps'
        }).addTo(map);

        // 2. 데이터 (우메다 사진을 외부 링크로 처리해서 무조건 뜨게 함)
        var locations = [
            {
                name: "우메다 헵파이브(HEP FIVE) 관람차",
                coords: [34.7042, 135.5006],
                desc: "멤버들이 빨간 관람차 안에서 오사카 시내를 구경하며 셀카를 남겼던 그곳!",
                googleMap: "https://www.google.com/maps/search/?api=1&query=HEP+FIVE+Ferris+Wheel&hl=ko",
                // 네가 준 사진을 깃허브 서버 주소로 직접 연결했어
                img: "https://raw.githubusercontent.com/ilovemj0914-svg/aa/main/umeda.jpg.png", 
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=215" 
            },
            {
                name: "신세카이 & 츠텐카쿠",
                coords: [34.6525, 135.5063],
                desc: "오사카의 복고풍 감성! 멤버들이 쿠시카츠를 맛있게 먹었던 상점가야.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Shinsekai+Osaka&hl=ko",
                img: "https://img.youtube.com/vi/V6_Vp9vC0Xg/hqdefault.jpg",
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=54"
            }
        ];

        locations.forEach(function(loc) {
            var popupContent = `
                <div class="popup-container">
                    <div class="popup-title">${loc.name}</div>
                    <img src="${loc.img}" class="thumb-img" alt="성지 사진" onerror="this.src='https://via.placeholder.com/280x180?text=이미지+준비중'">
                    <div class="video-container">
                        <iframe src="${loc.yt}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="popup-desc">${loc.desc}</div>
                    <a href="${loc.googleMap}" target="_blank" class="map-btn">상세 위치 보기</a>
                </div>
            `;
            L.marker(loc.coords).addTo(map).bindPopup(popupContent);
        });
    </script>
</body>
</html>
