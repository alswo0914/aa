<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        /* 팝업 창 크기를 영상이 잘 보이게 조정 */
        .popup-container { width: 280px; font-family: 'Malgun Gothic', sans-serif; }
        .popup-title { font-size: 17px; font-weight: bold; margin-bottom: 8px; color: #333; border-bottom: 2px solid #4285F4; padding-bottom: 3px; }
        .popup-desc { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.5; }
        /* 사진 스타일 */
        .thumb-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; display: block; }
        /* 영상 스타일 */
        .video-container { width: 100%; height: 157px; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .map-btn { 
            display: block; background: #4285F4; color: white; text-align: center; 
            padding: 10px; margin-top: 5px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 초기 설정 (한국어 구글 레이어 적용)
        var map = L.map('map').setView([34.685, 135.502], 13);
        L.tileLayer('https://mt0.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps'
        }).addTo(map);

        // 2. 성지순례 데이터 (사진 + 영상 주소 통합)
        // 사진 경로는 네 깃허브 저장소 이름을 반영했어.
        var locations = [
            {
                name: "우메다 헵파이브(HEP FIVE) 관람차",
                coords: [34.7042, 135.5006],
                desc: "멤버들이 빨간 관람차 안에서 셀카를 남겼던 곳!",
                googleMap: "https://www.google.com/maps/search/?api=1&query=HEP+FIVE&hl=ko",
                img: "image_4cae7b.jpg", // 저장소에 있는 사진 파일명
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=215" // 관람차 장면
            },
            {
                name: "신세카이 & 츠텐카쿠",
                coords: [34.6525, 135.5063],
                desc: "오사카의 복고풍 감성! 멤버들의 쿠시카츠 먹방 장소.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Tsutenkaku&hl=ko",
                img: "https://img.youtube.com/vi/V6_Vp9vC0Xg/hqdefault.jpg",
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=54"
            },
            {
                name: "아베노 하루카스 300",
                coords: [34.6458, 135.5139],
                desc: "일본 최고의 높이! 멤버들이 야경을 보며 감탄했던 곳.",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Abeno+Harukas&hl=ko",
                img: "https://img.youtube.com/vi/V6_Vp9vC0Xg/mqdefault.jpg",
                yt: "https://www.youtube.com/embed/V6_Vp9vC0Xg?start=373"
            }
        ];

        // 3. 마커 및 팝업(사진+영상) 생성
        locations.forEach(function(loc) {
            var popupContent = `
                <div class="popup-container">
                    <div class="popup-title">${loc.name}</div>
                    <img src="${loc.img}" class="thumb-img" alt="성지 사진">
                    <div class="video-container">
                        <iframe width="100%" height="100%" src="${loc.yt}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="popup-desc">${loc.desc}</div>
                    <a href="${loc.googleMap}" target="_blank" class="map-btn">상세 위치 보기</a>
                </div>
            `;
            L.marker(loc.coords).addTo(map).bindPopup(popupContent);
        });
    </script>
</body>
</html>
