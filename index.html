<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>트레저 오사카 성지순례 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-box { width: 280px; text-align: center; font-family: 'Malgun Gothic', sans-serif; }
        .thumb-img { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        
        /* 영상 박스 설정 */
        .video-container { 
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0; 
            border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* 참고 사이트 스타일의 버튼 */
        .map-btn { 
            display: block; background: #4285F4; color: white; padding: 10px; 
            border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px;
        }
        .leaflet-popup-content { width: 300px !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 설정 (한국어 구글 레이어)
        var map = L.map('map').setView([34.68, 135.50], 13);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}').addTo(map);

        // 2. 성지 데이터 (야키니쿠 상세 주소 및 영상 수정)
        var locations = [
            {
                name: "우메다 헵파이브 관람차",
                lat: 34.7042, lng: 135.5006,
                img: "https://i.ifh.cc/KMBGJO.jpg", // 네 사진 그대로 유지
                ytId: "sGNVI6fFS68", // 요청하신 영상으로 수정
                start: 707,
                desc: "멤버들이 빨간 관람차를 탔던 그곳 🎡",
                // 실제 구글맵 상세정보 링크
                googleMap: "https://www.google.com/maps/search/?api=1&query=HEP+FIVE+Ferris+Wheel&query_place_id=ChIJN8-592_mAGARqWlX7XGqZks"
            },
            {
                name: "야키니쿠 이치로 (소네자키점)",
                lat: 34.6458, lng: 135.5139,
                img: "https://i.ytimg.com/vi/VtjMPZgy4yU/maxresdefault.jpg", 
                ytId: "VtjMPZgy4yU",
                start: 300,
                desc: "어제 알려준 그 맛집! 입에서 살살 녹는 고기 🥩",
                // 네가 알려준 야키니쿠집 구글맵 상세 링크
                googleMap: "https://www.google.com/maps/search/?api=1&query=Yakiniku+Ichiro+Osaka"
            },
            {
                name: "나카노시마 공원",
                lat: 34.6922, lng: 135.5107,
                img: "https://img.youtube.com/vi/VtjMPZgy4yU/hqdefault.jpg",
                ytId: "VtjMPZgy4yU",
                start: 70,
                desc: "장미 정원이 예쁜 멤버들의 산책 코스 🌹",
                googleMap: "https://www.google.com/maps/search/?api=1&query=Nakanoshima+Park"
            }
        ];

        // 3. 마커 및 팝업 생성
        locations.forEach(function(loc) {
            var content = `
                <div class="popup-box">
                    <h3 style="margin:5px 0; color:#00ADEF;">${loc.name}</h3>
                    <img src="${loc.img}" class="thumb-img">
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${loc.ytId}?start=${loc.start}" allowfullscreen></iframe>
                    </div>
                    <p style="font-size:12px; color:#666; margin-bottom:10px;">${loc.desc}</p>
                    <a href="${loc.googleMap}" target="_blank" class="map-btn">구글맵 상세정보</a>
                </div>
            `;
            L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(content);
        });
    </script>
</body>
</html>
